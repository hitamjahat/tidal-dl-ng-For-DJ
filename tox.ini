[tox]
skipsdist = true
env_list = py312, py313
min_version = 4.0

[gh-actions]
python =
    3.12: py312
    3.13: py313

[testenv]
pass_env = PYTHON_VERSION
allowlist_externals = poetry
setenv =
    QT_QPA_PLATFORM = offscreen
    # Use environment-specific temp directory for isolation instead of global tox dir
    XDG_RUNTIME_DIR = {envtmpdir}/.xdg
    # Force poetry to use tox's environment for maximum efficiency
    POETRY_VIRTUALENVS_CREATE = false
commands =
    poetry install --no-interaction --all-extras --with dev,docs
    pytest --doctest-modules tests --cov --cov-config=pyproject.toml --cov-report=xml
